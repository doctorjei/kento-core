# Tag-driven rc-then-promote release pipeline for the `kento` PyPI package.
#
# Flow (matches the gemet/kanibako/droste ecosystem shape, simplified for a
# single PyPI package with NO container images):
#
#   1. Cut a release-candidate tag  v<ver>-rcN  -> `build` job runs: validates
#      the tag shape, runs the unit + integration test tiers, builds sdist+wheel,
#      twine-checks them, uploads them as an artifact, and creates a DRAFT
#      GitHub *prerelease* for the rc tag.
#   2. Verify the rc run is green.
#   3. Cut the final tag  v<ver>  -> `build` runs again (gate), then `publish`
#      rebuilds at the final version and OIDC-publishes to PyPI + publishes the
#      GitHub release. `publish` HARD-FAILS unless a matching v<ver>-rc* tag
#      exists (the rc-then-promote guarantee).
#
# `workflow_dispatch` runs `build` only (no release object, no publish): the
# "never tag without a green dispatch run on the same commit" pre-flight rule.
#
# Unlike the image repos we cannot byte-copy an rc artifact to the release
# version (PyPI filenames embed the version), so `publish` rebuilds at the final
# version. That is expected and matches kanibako's PyPI path.

name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

# Least privilege at the top; each job grants only what it needs.
permissions: {}

jobs:
  build:
    # Runs on every trigger: rc tag, release tag, or workflow_dispatch.
    name: build & test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the draft prerelease on rc tags
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # requires-python is ">=3.11" (clean floor) -> pin the floor.
          python-version: '3.11'

      - name: Install build & test tooling
        # pyproject declares no test extras; pytest is the only test dep.
        run: python -m pip install --upgrade pip build twine pytest

      - name: Validate release tag shape
        # Only enforce on tag pushes; workflow_dispatch has no tag.
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$'; then
            echo "::error::Invalid release tag '$tag'." \
              "Tags must match ^v[0-9]+.[0-9]+.[0-9]+(-rcN)?$ (e.g. v1.3.0 or v1.3.0-rc1)."
            exit 1
          fi
          echo "Tag '$tag' is a valid release tag."

      - name: Verify pyproject version matches the tag
        # The package version is the static `version` in pyproject.toml, NOT the
        # tag, so `python -m build` produces kento-<pyproject-version>.*. Guard
        # against tagging v1.3.0 while pyproject still says 1.2.0: require the
        # pyproject version to equal the tag's base (tag minus leading 'v' and
        # any -rcN suffix). tomllib is stdlib on the 3.11 floor.
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          base="${tag%-rc*}"           # strip -rcN if present
          proj="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$proj" != "$base" ]; then
            echo "::error::pyproject version ($proj) does not match tag base ($base)." \
              "Bump pyproject [project].version to $base before tagging."
            exit 1
          fi
          echo "pyproject version $proj matches tag $GITHUB_REF_NAME."

      - name: Run unit test suite (tier 1)
        run: make test

      - name: Run integration test suite (tier 2)
        # Root-only steps in this tier self-skip on the non-root runner.
        run: make test-integration

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify artifacts with twine
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

      - name: Create draft prerelease (rc tags only)
        # Only on a tag push whose name contains -rc. workflow_dispatch and
        # plain release tags skip this (release tags are published by `publish`).
        if: startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-rc')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          # Idempotent: recreate the draft if a previous rc run left one behind.
          gh release delete "$tag" --yes --cleanup-tag=false 2>/dev/null || true
          gh release create "$tag" dist/* \
            --draft \
            --prerelease \
            --title "$tag" \
            --notes "Release candidate $tag. Built and tested by CI; not published to PyPI."

  publish:
    # Runs ONLY on a plain release tag (v<ver>, no -rc).
    name: publish to PyPI & GitHub
    needs: build
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref_name, '-rc')
    runs-on: ubuntu-latest
    # The GitHub environment a PyPI Trusted Publisher binds to.
    environment: pypi
    permissions:
      id-token: write  # OIDC token for PyPI trusted publishing
      contents: write  # publish the GitHub release
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard - require a matching rc tag (rc-then-promote)
        # A release tag may only ship if its version was first cut and tested
        # as an rc. PyPI filenames embed the version, so we rebuild at the final
        # version rather than byte-copying the rc artifact.
        run: |
          ver="${GITHUB_REF_NAME}"
          rc_tags="$(git tag -l "${ver}-rc*")"
          if [ -z "$rc_tags" ]; then
            echo "::error::No rc tag found for ${ver}." \
              "Cut and test ${ver}-rcN before the ${ver} release tag."
            exit 1
          fi
          echo "Found rc tag(s) for ${ver}:"
          echo "$rc_tags"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Rebuild sdist + wheel at final release version
        run: python -m build

      - name: Publish to PyPI (OIDC trusted publishing)
        # No username/password/token: relies on `id-token: write` + the PyPI
        # Trusted Publisher configured for owner/repo/workflow/environment=pypi.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${GITHUB_REF_NAME}"
          # Create a published (non-draft, non-prerelease) release for v<ver>
          # with the freshly built artifacts. If one already exists for this
          # exact tag, flip it to published and refresh its assets.
          if gh release view "$ver" >/dev/null 2>&1; then
            gh release edit "$ver" --draft=false --prerelease=false --title "$ver"
            gh release upload "$ver" dist/* --clobber
          else
            gh release create "$ver" dist/* \
              --title "$ver" \
              --notes "Release $ver. Published to PyPI by CI via OIDC trusted publishing."
          fi
          # Best-effort cleanup of the rc draft prerelease(s); never fail on this.
          for rc in $(git tag -l "${ver}-rc*"); do
            gh release delete "$rc" --yes --cleanup-tag=false 2>/dev/null || true
          done
